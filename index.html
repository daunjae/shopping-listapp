<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 14px;
    }

    .summary span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li button.delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    li button.delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0 16px;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 10px;
      background: none;
      border: 1.5px dashed #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="summary" id="summary"></div>

    <ul id="list"></ul>

    <div id="emptyMsg" class="empty-msg">아이템을 추가해 보세요!</div>

    <button class="clear-btn" onclick="clearChecked()" id="clearBtn" style="display:none">
      완료된 항목 모두 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const summary = document.getElementById('summary');
    const clearBtn = document.getElementById('clearBtn');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false, id: Date.now() });
      input.value = '';
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function render() {
      list.innerHTML = '';
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      emptyMsg.style.display = total === 0 ? 'block' : 'none';
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      if (total > 0) {
        summary.innerHTML = `전체 <span>${total}</span>개 · 완료 <span>${done}</span>개`;
      } else {
        summary.innerHTML = '';
      }

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggleItem(item.id));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '×';
        btn.title = '삭제';
        btn.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    render();
  </script>
</body>
</html>
